<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGO BrickFinder | 樂高型號查詢</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .lego-red { background-color: #d11013; }
        .card-shadow { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-loading { opacity: 0.7; pointer-events: none; }
        .history-tag { cursor: pointer; transition: all 0.2s; }
        .history-tag:hover { background-color: #e5e7eb; transform: translateY(-1px); }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="lego-red p-4 text-white shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tighter">LEGO <span class="font-light">BrickFinder</span></h1>
        </div>
    </nav>

    <div class="container mx-auto mt-10 px-4">
        <div class="max-w-xl mx-auto text-center">
            <h2 class="text-3xl font-bold mb-4 text-gray-800">搜尋你的型號</h2>
            <div class="flex gap-2">
                <input type="text" id="searchInput" placeholder="輸入樂高型號 (如: 10333)..." 
                       class="flex-1 p-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 outline-none" autofocus>
                <button id="searchBtn" onclick="searchLego()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">查詢</button>
            </div>
            
            <div id="historyContainer" class="mt-4 flex flex-wrap justify-center gap-2">
                </div>
            
            <p id="statusMsg" class="mt-3 text-red-500 hidden italic"></p>
        </div>
    </div>

    <main class="container mx-auto mt-10 px-4 pb-20">
        <div id="resultContainer" class="max-w-4xl mx-auto bg-white rounded-2xl p-6 card-shadow hidden">
            <div class="md:flex gap-8">
                <div class="md:w-1/2">
                    <img id="legoImg" src="" alt="Lego Image" class="w-full h-auto rounded-lg object-contain">
                </div>
                <div class="md:w-1/2 mt-6 md:mt-0">
                    <h3 id="legoName" class="text-2xl font-bold text-gray-900 mb-2"></h3>
                    <div class="space-y-3 text-gray-600">
                        <p><strong>型號：</strong> <span id="legoId"></span></p>
                        <p><strong>零件數量：</strong> <span id="legoPieces"></span> pcs</p>
                        <p><strong>發行年份：</strong> <span id="legoYear"></span></p>
                        <p><strong>主題系列：</strong> <span id="legoTheme" class="text-blue-600 font-medium">載入中...</span></p>
                        <hr>
                        <a id="legoUrl" href="#" target="_blank" rel="noopener noreferrer" 
                           class="flex justify-center items-center gap-2 w-full bg-yellow-400 text-black font-bold py-3 rounded-xl hover:bg-yellow-500 transition shadow-sm active:scale-95">
                            <span>查看詳細資訊</span>
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14" />
                            </svg>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        const API_KEY = '8cbdfafeaae44206585e06909cf319fc';
        
        // 頁面載入時初始化搜尋紀錄
        window.onload = displayHistory;

        async function searchLego(targetId = null) {
            let id = targetId || document.getElementById('searchInput').value.trim();
            if (targetId) document.getElementById('searchInput').value = targetId;

            const status = document.getElementById('statusMsg');
            const result = document.getElementById('resultContainer');
            const btn = document.getElementById('searchBtn');
            
            if (!id) return;

            const formattedId = id.includes('-') ? id : `${id}-1`;

            status.classList.add('hidden');
            btn.innerText = "搜尋中...";
            btn.classList.add('btn-loading');

            try {
                const response = await fetch(`https://rebrickable.com/api/v3/lego/sets/${formattedId}/`, {
                    headers: { 'Authorization': `key ${API_KEY}` }
                });

                if (!response.ok) {
                    throw new Error(response.status === 404 ? "找不到該型號，請檢查編號。" : "連線失敗。");
                }

                const data = await response.json();
                
                // 搜尋成功後存入紀錄
                saveToHistory(id);
                displayResult(data);

            } catch (err) {
                status.innerText = err.message;
                status.classList.remove('hidden');
                result.classList.add('hidden');
            } finally {
                btn.innerText = "查詢";
                btn.classList.remove('btn-loading');
            }
        }

        async function displayResult(data) {
            const resultContainer = document.getElementById('resultContainer');
            document.getElementById('legoName').innerText = data.name;
            document.getElementById('legoId').innerText = data.set_num.replace('-1', '');
            document.getElementById('legoPieces').innerText = data.num_parts;
            document.getElementById('legoYear').innerText = data.year;
            document.getElementById('legoImg').src = data.set_img_url || 'https://via.placeholder.com/600x400?text=No+Image+Available';
            document.getElementById('legoUrl').href = data.rebrickable_url || `https://rebrickable.com/search/?q=${data.set_num}`;

            resultContainer.classList.add('hidden');
            resultContainer.style.opacity = "0";
            resultContainer.classList.remove('hidden');
            
            setTimeout(() => {
                resultContainer.style.transition = "opacity 0.5s ease-in-out";
                resultContainer.style.opacity = "1";
            }, 10);

            const themeSpan = document.getElementById('legoTheme');
            themeSpan.innerText = "查詢中...";
            try {
                const themeResponse = await fetch(`https://rebrickable.com/api/v3/lego/themes/${data.theme_id}/`, {
                    headers: { 'Authorization': `key ${API_KEY}` }
                });
                if (themeResponse.ok) {
                    const themeData = await themeResponse.json();
                    themeSpan.innerText = themeData.name;
                } else {
                    themeSpan.innerText = "未知系列";
                }
            } catch (err) {
                themeSpan.innerText = "載入失敗";
            }
        }

        // --- 搜尋紀錄邏輯 ---
        function saveToHistory(id) {
            let history = JSON.parse(localStorage.getItem('legoHistory') || '[]');
            // 移除重複並將新搜尋放在最前面
            history = history.filter(item => item !== id);
            history.unshift(id);
            // 只保留最近 5 筆
            history = history.slice(0, 5);
            localStorage.setItem('legoHistory', JSON.stringify(history));
            displayHistory();
        }

        function displayHistory() {
            const container = document.getElementById('historyContainer');
            const history = JSON.parse(localStorage.getItem('legoHistory') || '[]');
            
            if (history.length === 0) {
                container.innerHTML = '';
                return;
            }

            container.innerHTML = '<span class="text-gray-400 text-sm w-full block mb-1">最近搜尋:</span>';
            history.forEach(id => {
                const tag = document.createElement('span');
                tag.className = "history-tag bg-gray-200 text-gray-700 px-3 py-1 rounded-full text-sm font-medium border border-gray-300";
                tag.innerText = id;
                tag.onclick = () => searchLego(id);
                container.appendChild(tag);
            });
        }

        document.getElementById('searchInput').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') searchLego();
        });
    </script>
</body>
</html>
