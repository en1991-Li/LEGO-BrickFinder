<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LEGO BrickFinder | 樂高型號查詢</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .lego-red { background-color: #d11013; }
        .card-shadow { box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .btn-loading { opacity: 0.7; pointer-events: none; }
        .history-tag { cursor: pointer; transition: all 0.2s; }
        .history-tag:hover { background-color: #e5e7eb; transform: translateY(-1px); }
        .collection-card { transition: transform 0.2s; }
        .collection-card:hover { transform: scale(1.02); }
    </style>
</head>
<body class="bg-gray-50 font-sans">

    <nav class="lego-red p-4 text-white shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="text-2xl font-bold tracking-tighter">LEGO <span class="font-light">BrickFinder</span></h1>
        </div>
    </nav>

    <div class="container mx-auto mt-10 px-4">
        <div class="max-w-xl mx-auto text-center">
            <h2 class="text-3xl font-bold mb-4 text-gray-800">搜尋你的型號</h2>
            <div class="flex gap-2">
                <input type="text" id="searchInput" placeholder="輸入樂高型號 (如: 10333)..." 
                       class="flex-1 p-3 border-2 border-gray-300 rounded-lg focus:border-blue-500 outline-none" autofocus>
                <button id="searchBtn" onclick="searchLego()" class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition">查詢</button>
            </div>
            <div id="historyContainer" class="mt-4 flex flex-wrap justify-center gap-2"></div>
            <p id="statusMsg" class="mt-3 text-red-500 hidden italic"></p>
        </div>
    </div>

    <main class="container mx-auto mt-10 px-4">
        <div id="resultContainer" class="max-w-4xl mx-auto bg-white rounded-2xl p-6 card-shadow hidden">
            <div class="md:flex gap-8">
                <div class="md:w-1/2">
                    <img id="legoImg" src="" alt="Lego Image" class="w-full h-auto rounded-lg object-contain">
                </div>
                <div class="md:w-1/2 mt-6 md:mt-0">
                    <div class="flex justify-between items-start">
                        <h3 id="legoName" class="text-2xl font-bold text-gray-900 mb-2"></h3>
                        <button id="favoriteBtn" onclick="toggleFavorite()" class="text-3xl focus:outline-none transition active:scale-90">🤍</button>
                    </div>
                    <div class="space-y-3 text-gray-600">
                        <p><strong>型號：</strong> <span id="legoId"></span></p>
                        <p><strong>零件數量：</strong> <span id="legoPieces"></span> pcs</p>
                        <p><strong>發行年份：</strong> <span id="legoYear"></span></p>
                        <p><strong>主題系列：</strong> <span id="legoTheme" class="text-blue-600 font-medium">載入中...</span></p>
                        <hr>
                        <a id="legoUrl" href="#" target="_blank" rel="noopener noreferrer" 
                           class="flex justify-center items-center gap-2 w-full bg-yellow-400 text-black font-bold py-3 rounded-xl hover:bg-yellow-500 transition shadow-sm active:scale-95">
                            <span>查看詳細資訊</span>
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <section class="container mx-auto mt-16 px-4 pb-20">
        <div class="max-w-4xl mx-auto">
            <div class="flex items-center gap-2 mb-6 border-b-2 border-gray-200 pb-2">
                <span class="text-2xl">⭐</span>
                <h2 class="text-2xl font-bold text-gray-800">我的收藏清單</h2>
            </div>
            <div id="collectionGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4">
                </div>
            <p id="emptyMsg" class="text-gray-400 text-center py-10 italic">尚未收藏任何樂高型號</p>
        </div>
    </section>

    <script>
        const API_KEY = '8cbdfafeaae44206585e06909cf319fc';
        let currentLegoData = null; // 儲存當前查詢成功的資料

        window.onload = () => {
            displayHistory();
            displayCollection();
        };

        async function searchLego(targetId = null) {
            let id = targetId || document.getElementById('searchInput').value.trim();
            if (targetId) document.getElementById('searchInput').value = targetId;
            const status = document.getElementById('statusMsg');
            const result = document.getElementById('resultContainer');
            const btn = document.getElementById('searchBtn');
            
            if (!id) return;
            const formattedId = id.includes('-') ? id : `${id}-1`;

            status.classList.add('hidden');
            btn.innerText = "搜尋中...";
            btn.classList.add('btn-loading');

            try {
                const response = await fetch(`https://rebrickable.com/api/v3/lego/sets/${formattedId}/`, {
                    headers: { 'Authorization': `key ${API_KEY}` }
                });
                if (!response.ok) throw new Error("找不到該型號。");

                currentLegoData = await response.json();
                saveToHistory(id);
                displayResult(currentLegoData);
            } catch (err) {
                status.innerText = err.message;
                status.classList.remove('hidden');
                result.classList.add('hidden');
            } finally {
                btn.innerText = "查詢";
                btn.classList.remove('btn-loading');
            }
        }

        function displayResult(data) {
            const resultContainer = document.getElementById('resultContainer');
            document.getElementById('legoName').innerText = data.name;
            document.getElementById('legoId').innerText = data.set_num.replace('-1', '');
            document.getElementById('legoPieces').innerText = data.num_parts;
            document.getElementById('legoYear').innerText = data.year;
            document.getElementById('legoImg').src = data.set_img_url || 'https://via.placeholder.com/600x400';
            document.getElementById('legoUrl').href = data.rebrickable_url;

            // 更新愛心狀態
            updateHeartUI(data.set_num);

            resultContainer.classList.remove('hidden');
            resultContainer.style.opacity = "0";
            setTimeout(() => {
                resultContainer.style.transition = "opacity 0.5s";
                resultContainer.style.opacity = "1";
            }, 10);

            // 主題抓取邏輯 (省略重複部分)
            fetchTheme(data.theme_id);
        }

        async function fetchTheme(themeId) {
            const themeSpan = document.getElementById('legoTheme');
            try {
                const res = await fetch(`https://rebrickable.com/api/v3/lego/themes/${themeId}/`, {
                    headers: { 'Authorization': `key ${API_KEY}` }
                });
                const themeData = await res.json();
                themeSpan.innerText = themeData.name;
            } catch { themeSpan.innerText = "未知系列"; }
        }

        // --- 收藏功能邏輯 ---
        function toggleFavorite() {
            if (!currentLegoData) return;
            let collection = JSON.parse(localStorage.getItem('legoCollection') || '[]');
            const index = collection.findIndex(item => item.set_num === currentLegoData.set_num);

            if (index === -1) {
                // 加入收藏
                collection.push({
                    set_num: currentLegoData.set_num,
                    name: currentLegoData.name,
                    img: currentLegoData.set_img_url,
                    year: currentLegoData.year
                });
            } else {
                // 取消收藏
                collection.splice(index, 1);
            }

            localStorage.setItem('legoCollection', JSON.stringify(collection));
            updateHeartUI(currentLegoData.set_num);
            displayCollection();
        }

        function updateHeartUI(setNum) {
            const collection = JSON.parse(localStorage.getItem('legoCollection') || '[]');
            const isFav = collection.some(item => item.set_num === setNum);
            document.getElementById('favoriteBtn').innerText = isFav ? "❤️" : "🤍";
        }

        function displayCollection() {
            const grid = document.getElementById('collectionGrid');
            const emptyMsg = document.getElementById('emptyMsg');
            const collection = JSON.parse(localStorage.getItem('legoCollection') || '[]');

            if (collection.length === 0) {
                grid.innerHTML = '';
                emptyMsg.classList.remove('hidden');
                return;
            }

            emptyMsg.classList.add('hidden');
            grid.innerHTML = collection.map(item => `
                <div class="collection-card bg-white p-3 rounded-xl shadow-sm border border-gray-100 cursor-pointer" onclick="searchLego('${item.set_num}')">
                    <img src="${item.img || 'https://via.placeholder.com/150'}" class="w-full h-24 object-contain mb-2 rounded">
                    <p class="text-xs font-bold text-gray-500">${item.set_num.replace('-1', '')}</p>
                    <p class="text-sm font-bold text-gray-800 truncate">${item.name}</p>
                </div>
            `).join('');
        }

        // --- 搜尋紀錄 (原有邏輯) ---
        function saveToHistory(id) {
            let history = JSON.parse(localStorage.getItem('legoHistory') || '[]');
            history = [id, ...history.filter(i => i !== id)].slice(0, 5);
            localStorage.setItem('legoHistory', JSON.stringify(history));
            displayHistory();
        }

        function displayHistory() {
            const container = document.getElementById('historyContainer');
            const history = JSON.parse(localStorage.getItem('legoHistory') || '[]');
            container.innerHTML = history.length ? '<span class="text-gray-400 text-sm w-full block mb-1">最近搜尋:</span>' : '';
            history.forEach(id => {
                const tag = document.createElement('span');
                tag.className = "history-tag bg-gray-200 text-gray-700 px-3 py-1 rounded-full text-sm font-medium border border-gray-300";
                tag.innerText = id;
                tag.onclick = () => searchLego(id);
                container.appendChild(tag);
            });
        }

        document.getElementById('searchInput').addEventListener('keypress', (e) => e.key === 'Enter' && searchLego());
    </script>
</body>
</html>
